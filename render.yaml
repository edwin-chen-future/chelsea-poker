services:
  - type: web
    name: chelsea-poker
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/sessions
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chelsea-poker-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: chelsea-poker-db
    region: oregon
    plan: free
