AWSTemplateFormatVersion: '2010-09-09'
Description: Chelsea Poker - ECS Fargate + RDS Postgres + API Gateway HTTP API

Parameters:
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Password for the RDS Postgres database
  JwtSecret:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Secret key for signing JWT tokens
  GoogleClientIds:
    Type: String
    Description: Comma-separated Google OAuth client IDs for token validation
  ECRImageUri:
    Type: String
    Description: ECR image URI (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/chelsea-poker:latest)
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 subnets in different AZs (for RDS and ECS)

Resources:

  # --- Security Groups ---

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Chelsea Poker ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Chelsea Poker RDS Postgres
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsSecurityGroup

  # --- RDS Postgres ---

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Chelsea Poker DB subnets
      SubnetIds: !Ref SubnetIds

  Database:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: chelsea-poker-db
      Engine: postgres
      EngineVersion: '15'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      DBName: chelsea_poker
      MasterUsername: postgres
      MasterUserPassword: !Ref DBPassword
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      StorageType: gp3
      BackupRetentionPeriod: 7
    DeletionPolicy: Snapshot

  # --- CloudWatch Logs ---

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/chelsea-poker
      RetentionInDays: 14

  # --- IAM Roles ---

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # --- Service Discovery (Cloud Map) ---

  ServiceDiscoveryNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: chelsea-poker.local
      Vpc: !Ref VpcId

  ServiceDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: api
      NamespaceId: !Ref ServiceDiscoveryNamespace
      DnsConfig:
        DnsRecords:
          - Type: SRV
            TTL: 10
        NamespaceId: !Ref ServiceDiscoveryNamespace
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # --- ECS Cluster & Service ---

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: chelsea-poker

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: chelsea-poker
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: chelsea-poker
          Image: !Ref ECRImageUri
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
              Name: api
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '3000'
            - Name: DATABASE_URL
              Value: !Sub postgresql://postgres:${DBPassword}@${Database.Endpoint.Address}:5432/chelsea_poker
            - Name: JWT_SECRET
              Value: !Ref JwtSecret
            - Name: GOOGLE_CLIENT_IDS
              Value: !Ref GoogleClientIds
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  EcsService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref EcsCluster
      ServiceName: chelsea-poker
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref EcsSecurityGroup
          Subnets: !Ref SubnetIds
      ServiceRegistries:
        - RegistryArn: !GetAtt ServiceDiscoveryService.Arn
          ContainerName: chelsea-poker
          ContainerPort: 3000

  # --- API Gateway HTTP API + VPC Link ---

  VpcLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: chelsea-poker-vpclink
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds:
        - !Ref EcsSecurityGroup

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: chelsea-poker-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
        AllowHeaders:
          - Content-Type
          - Authorization

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      ConnectionType: VPC_LINK
      ConnectionId: !Ref VpcLink
      IntegrationUri: !GetAtt ServiceDiscoveryService.Arn
      PayloadFormatVersion: '1.0'

  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: '$default'
      Target: !Sub integrations/${HttpApiIntegration}

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !GetAtt HttpApi.ApiEndpoint
  DatabaseEndpoint:
    Description: RDS Postgres endpoint
    Value: !GetAtt Database.Endpoint.Address
  ClusterName:
    Description: ECS Cluster name
    Value: !Ref EcsCluster
